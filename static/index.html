<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>بنك الأسئلة</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="backBtn" class="back-btn" aria-label="رجوع">‹</button>
      <div class="topbar-titles">
        <span id="eyebrow" class="eyebrow"></span>
        <h1 id="screenTitle">بنك الأسئلة</h1>
      </div>
    </header>
    <main id="screen"></main>
  </div>

  <!-- مربع الشرح المنبثق -->
  <div id="noteModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <span class="modal-label">الشرح</span>
        <button id="noteCloseBtn" class="modal-close" aria-label="إغلاق">×</button>
      </div>
      <div id="noteBody" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
